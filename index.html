<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Power Service SDP Platform</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Play', 'Inter', 'Outfit', 'Plus Jakarta Sans', 'sans-serif'],
              display: ['Play', 'Outfit', 'sans-serif'],
            }
          }
        }

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      /* Using a more complex gradient for the background */
      /* Ensure base font size uniformity */
      html {
        font-size: 16px;
      }
      body {
        font-family: 'Play', 'Inter', 'Outfit', 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif !important;
        background: var(--color-background-body);
        background-color: #f0fdf4; /* fallback */
        background-size: cover;
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      * {
        scrollbar-width: none !important; /* Firefox */
        -ms-overflow-style: none !important; /* IE 10+ */
      }
      *::-webkit-scrollbar {
        display: none !important; /* Webkit / Chrome */
      }
      
      input, button, select, textarea {
        font-family: inherit;
        font-size: inherit;
      }

      /* Global icon centering helper */
      .flex-center-icon {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      /* Synchronize common text sizes if they drift */
      h1, h2, h3, h4, .h1, .h2, .h3, .h4 {
        line-height: 1.25;
        letter-spacing: -0.02em;
      }
      /* Custom utility to hide scrollbars */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      
      /* Custom animations */
      @keyframes fade-in-down {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-down {
        animation: fade-in-down 0.3s ease-out forwards;
      }

      @keyframes fade-out-up {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(-10px);
        }
      }
      .animate-fade-out-up {
          animation: fade-out-up 0.3s ease-out forwards;
      }

      @keyframes fade-in-up {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fade-in-up 0.3s ease-out forwards;
      }
      
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }
      .animate-shake {
        animation: shake 0.2s ease-in-out 0s 2;
      }

      /* ======================================================================
         THEME & COLOR VARIABLES
         ====================================================================== */
      :root {
        /* Light Theme Colors */
        --color-text-primary: #0f172a;      /* slate-900 for ultra crisp text on glass */
        --color-text-secondary: #334155;    /* slate-700 */
        --color-text-subtle: #475569;       /* slate-600 */
        --color-background-body: linear-gradient(45deg, #dff4e4 0%, #f0ddee 24%, #dee7f5 49%, #e9dae4 73%, #cbffff 100%); /* updated background */
        --color-surface-primary: rgba(255, 255, 255, 0.7);
        --color-surface-secondary: rgba(255, 255, 255, 0.8);
        --color-surface-tertiary: rgba(255, 255, 255, 0.9);
        --color-surface-solid: #ffffff;
        --color-card-bg-rgb: 255, 255, 255;
        --color-border-primary: #e2e8f0;    /* slate-200 */
        --color-border-secondary: #f1f5f9;  /* slate-100 */

        --color-destructive-fg: #dc2626; /* red-600 */
        --color-destructive-bg: rgba(239, 68, 68, 0.1); /* red-500/10 */
        --color-success-fg: #16a34a; /* green-600 */
      }

      .dark {
        /* Dark Theme Colors */
        --color-text-primary: #f8fafc;      /* slate-50 */
        --color-text-secondary: #cbd5e1;    /* slate-300 */
        --color-text-subtle: #94a3b8;       /* slate-400 */
        --color-background-body: linear-gradient(45deg, #dff4e4 0%, #f0ddee 24%, #dee7f5 49%, #e9dae4 73%, #cbffff 100%); /* updated background */
        --color-surface-primary: rgba(30, 41, 59, 0.7);
        --color-surface-secondary: rgba(30, 41, 59, 0.8);
        --color-surface-tertiary: rgba(30, 41, 59, 0.9);
        --color-surface-solid: #1e293b;
        --color-card-bg-rgb: 30, 41, 59;
        --color-border-primary: #1e293b;    /* slate-800 */
        --color-border-secondary: #334155;  /* slate-700 */

        --color-destructive-fg: #f87171; /* red-400 */
        --color-destructive-bg: rgba(248, 113, 113, 0.15); /* red-400/15 */
        --color-success-fg: #4ade80; /* green-400 */

      [data-accent-color="cyan"] {

        --color-accent-700: #be123c;
        --color-accent-gradient-secondary: #d946ef; /* fuchsia-500 */

      [data-accent-color="purple"] {

        --color-accent-600: #9333ea;

        --color-accent-gradient-secondary: #06b6d4;

      }

      [data-accent-color="amber"] {
        --color-accent-100: #fef3c7;
        --color-accent-400: #fbbf24;
        --color-accent-500: #f59e0b;
        --color-accent-600: #d97706;
        --color-accent-700: #b45309;
        --color-accent-gradient-secondary: #f97316;
        --color-accent-shadow: rgba(245, 158, 11, 0.25);
      }

      [data-accent-color="pink"] {
        --color-accent-100: #fce7f3;
        --color-accent-400: #f472b6;
        --color-accent-500: #ec4899;
        --color-accent-600: #db2777;
        --color-accent-700: #be185d;
        --color-accent-gradient-secondary: #a855f7;

      }

      [data-accent-color="teal"] {

      /* Automatic Premium Glassmorphism Overrides */
      .bg-\[--color-surface-primary\],
      .bg-\[--color-surface-secondary\],
      .bg-\[--color-surface-tertiary\],
      .bg-\[--color-surface-solid\] {
        backdrop-filter: blur(16px) saturate(190%) !important;
        -webkit-backdrop-filter: blur(16px) saturate(190%) !important;
        transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                    border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                    box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }

      /* Elevate card borders for frosted look */
      .border-\[--color-border-primary\],
      .border-\[--color-border-secondary\],
      .border-slate-200,
      .dark .border-slate-800 {
        border-color: rgba(255, 255, 255, 0.16) !important;
      }
      .dark .border-\[--color-border-primary\], 
      .dark .border-\[--color-border-secondary\] {
        border-color: rgba(255, 255, 255, 0.08) !important;
      }

      /* Add distinct high-fidelity glass cards */
      .glass-card-premium {
        background: rgba(255, 255, 255, 0.25) !important;
        backdrop-filter: blur(20px) saturate(200%) !important;
        -webkit-backdrop-filter: blur(20px) saturate(200%) !important;
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
        box-shadow: 0 8px 32px 0 rgba(15, 23, 42, 0.04) !important;
      }
      .dark .glass-card-premium {
        background: rgba(15, 23, 42, 0.35) !important;
        backdrop-filter: blur(20px) saturate(200%) !important;
        -webkit-backdrop-filter: blur(20px) saturate(200%) !important;
        border: 1px solid rgba(255, 255, 255, 0.09) !important;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3) !important;
      }

      /* Refined scrollbar styling for seamless feel */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }
    </style>

<script>
  // Safety patch for "Cannot set property fetch of #<Window> which has only a getter" error in sandboxed iframes
  (function() {
    try {
      var originalFetch = window.fetch;
      var customFetch = originalFetch;
      Object.defineProperty(window, 'fetch', {
        get: function() {
          return customFetch;
        },
        set: function(val) {
          customFetch = val;
        },
        configurable: true,
        enumerable: true
      });
    } catch (e) {
      console.warn("Failed to patch window.fetch:", e);
    }
  })();

  // IIFE to set theme, font size, and layout density before React mounts
  (function() {
    const theme = localStorage.getItem('theme') || 'system';
    const accent = localStorage.getItem('accentColor') || 'cyan';
    const fontSize = localStorage.getItem('userFontSize') || 'medium';
    const layoutDensity = localStorage.getItem('userLayoutDensity') || 'standard';
    const doc = document.documentElement;

    doc.setAttribute('data-accent-color', accent);
    
    if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      doc.classList.add('dark');
    } else {
      doc.classList.remove('dark');
    }

    const sizeScaleMap = { 'small': '0.9', 'medium': '1.0', 'large': '1.15', 'xlarge': '1.3' };
    const densityScaleMap = { 'compact': '0.75', 'standard': '1.0', 'spacious': '1.25' };

    doc.style.setProperty('--user-font-scale', sizeScaleMap[fontSize] || '1.0');
    doc.style.setProperty('--layout-spacing-factor', densityScaleMap[layoutDensity] || '1.0');
  })();
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
